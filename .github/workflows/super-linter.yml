---
name: Lint

on: # yamllint disable-line rule:truthy
  push: null
  pull_request: null

permissions: {}

jobs:
  build:
    name: Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      issues: write
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout code
        # 修复：将 v5 替换为具体的 SHA 哈希值
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Super-linter
        # 修复：将 v8.5.0 替换为具体的 SHA 哈希值
        uses: super-linter/super-linter@85f6a13e33c7062f83735706f95710c318286ec0 # v8.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 可选修复：如果你不想让 README 的空格/格式问题导致报错，可以取消下面这行的注释
          # VALIDATE_MARKDOWN_PRETTIER: false
